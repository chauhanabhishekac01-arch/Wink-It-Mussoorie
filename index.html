<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    <div class="maintenance-container">
        
        <h1>Wink It Mussoorie</h1>
        
        
        <div class="maintenance-container">
    <div class="icon">⏳</div>
    <h1>Scheduled Maintenance</h1>
    <p>We’re performing a scheduled upgrade to improve your experience.</p>
    
    <div class="timer-grid">
        <div class="time-box"><span id="hours">00</span><small>Hours</small></div>
        <div class="time-box"><span id="minutes">00</span><small>Mins</small></div>
        <div class="time-box"><span id="seconds">00</span><small>Secs</small></div>
    </div>

    <p class="status-text">Maintenance Break ends at 11:00 PM</p>

    <script src="script.js"></script>
</body>
</html>
